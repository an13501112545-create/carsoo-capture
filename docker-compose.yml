version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: carsoo
      POSTGRES_PASSWORD: carsoo
      POSTGRES_DB: carsoo_capture
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql://carsoo:carsoo@db:5432/carsoo_capture
      APP_BASE_URL: http://localhost:3000
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: carsoo-capture
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
      JWT_SECRET: dev-secret
      JWT_ISSUER: carsoo-capture
      ADMIN_SEED_EMAIL: admin@carsoo.ai
      ADMIN_SEED_PASSWORD: admin123
    ports:
      - "8000:8000"
    depends_on:
      - db
      - minio

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db_data:
  minio_data:
